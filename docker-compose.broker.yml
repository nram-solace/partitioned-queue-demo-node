# Merged with docker-compose.yml when using the bundled PubSub+ broker (see .env COMPOSE_FILE).
# Overrides messaging + SEMP settings so a cloud-oriented demo.env does not break the local broker.

services:
  solace-init:
    environment:
      SOLACE_HOST: solace-broker
      SEMP_HOST: solace-broker
      MSG_VPN: default
      SEMP_SCHEME: http
      SEMP_PORT: 8080
      SEMP_USER: admin
      SEMP_PASS: admin

  consumer:
    depends_on:
      solace-init:
        condition: service_completed_successfully
        required: false
    environment:
      SOLACE_HOST: ws://solace-broker:8008
      SOLACE_VPN: default
      SOLACE_USERNAME: default
      SOLACE_PASSWORD: default

  publisher:
    depends_on:
      solace-init:
        condition: service_completed_successfully
        required: false
    environment:
      SOLACE_HOST: ws://solace-broker:8008
      SOLACE_VPN: default
      SOLACE_USERNAME: default
      SOLACE_PASSWORD: default

  # Browser uses host-mapped :8008. Set SOLACE_PUBLIC_URL=ws://<VM-IP>:8008 in demo.env on remote VMs.
  frontend:
    environment:
      SOLACE_PUBLIC_URL: ${SOLACE_PUBLIC_URL:-ws://localhost:8008}
