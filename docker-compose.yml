services:
  solace-broker:
    image: solace/solace-pubsub-standard:latest
    container_name: solace-broker
    hostname: solace-broker
    shm_size: 2g
    ulimits:
      nofile:
        soft: 2448
        hard: 1048576
    ports:
      # Management and Admin
      - "8080:8080"   # PubSub+ Manager (Web UI)
      - "2222:2222"   # Solace CLI (SSH)
      
      # Messaging Protocols
      - "55333:55555" # SMF (Solace Message Format) - TCP
      - "8008:8008"   # Web Transport (WebSocket) - Used by the demo
      - "1883:1883"   # MQTT
      - "8000:8000"   # MQTT over WebSockets
      - "5672:5672"   # AMQP
      - "9000:9000"   # REST Messaging API
      
    environment:
      # Admin credentials for PubSub+ Manager
      - username_admin_globalaccesslevel=admin
      - username_admin_password=admin
      
      # Create default VPN with admin access
      #- system_scaling_maxconnectioncount=100
      #- system_scaling_maxqueuemessagecount=1000
      
    volumes:
      - solace-data:/var/lib/solace
      - solace-logs:/var/lib/solace/logs
      
    healthcheck:
      # Guaranteed-messaging probe on :5550 often stays red until spool is fully up; Manager/SEMP on :8080
      # matches what you use in the browser and is a better readiness signal for this demo.
      test: ["CMD-SHELL", "curl -sf --connect-timeout 3 http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s
      
    restart: unless-stopped

  # After the broker container starts, create Demo_PQ / Demo_NQ / Demo_EQ and
  # topic subscription solace/demo/> (SEMP), same pattern as tmp/IBMMQ-Connector/docker-compose.yaml.
  solace-init:
    image: alpine:3.19
    container_name: solace-broker-init
    depends_on:
      solace-broker:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
    env_file:
      - ./docker/demo.apps.env
    environment:
      # SEMP uses plain hostname; SOLACE_HOST in the file is the ws:// URL for Node apps.
      SOLACE_HOST: solace-broker
      SEMP_USER: admin
      SEMP_PASS: admin
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache curl jq >/dev/null
        exec /bin/sh /app/scripts/setup-solace.sh

  # Node consumer + publisher (config: docker/demo.apps.env).
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    image: partitioned-queue-demo-node:local
    container_name: demo-consumer
    command: ["node", "backend/consumer.js"]
    depends_on:
      solace-broker:
        condition: service_started
      solace-init:
        condition: service_completed_successfully
    env_file:
      - ./docker/demo.apps.env
    restart: unless-stopped

  publisher:
    image: partitioned-queue-demo-node:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-publisher
    command: ["node", "backend/publisher.js"]
    depends_on:
      solace-broker:
        condition: service_started
      solace-init:
        condition: service_completed_successfully
      consumer:
        condition: service_started
    env_file:
      - ./docker/demo.apps.env
    restart: unless-stopped

  # Static React dashboard (Vite build); browser uses Web Transport :8008 → broker.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SOLACE_URL: ${VITE_SOLACE_URL:-ws://localhost:8008}
        VITE_SOLACE_VPN: ${VITE_SOLACE_VPN:-default}
        VITE_SOLACE_USERNAME: ${VITE_SOLACE_USERNAME:-default}
        VITE_SOLACE_PASSWORD: ${VITE_SOLACE_PASSWORD:-default}
        VITE_NQ_PREDICTION_CONSUMER: ${VITE_NQ_PREDICTION_CONSUMER:-1}
        VITE_DASHBOARD_VERSION: ${VITE_DASHBOARD_VERSION:-3.3}
    image: partitioned-queue-demo-frontend:local
    container_name: demo-frontend
    depends_on:
      consumer:
        condition: service_started
    volumes:
      # Runtime Solace URL for browsers on another host — edit docker/dashboard-config.js (no image rebuild).
      - ./docker/dashboard-config.js:/usr/share/nginx/html/config.js:ro
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  solace-data:
    driver: local
  solace-logs:
    driver: local

