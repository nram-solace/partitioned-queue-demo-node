# Full local stack: optional bundled PubSub+ broker (profile "broker") + demo apps.
# Default: COMPOSE_PROFILES=broker in .env starts broker + solace-init + apps.
#
# Apps only (external broker): docker compose -f docker-compose.minimal.yml up -d --build
# Broker disabled on this file:    COMPOSE_PROFILES= docker compose up -d --build

include:
  - docker-compose.apps.yml

services:
  solace-broker:
    profiles: [broker]
    image: solace/solace-pubsub-standard:latest
    container_name: solace-broker
    hostname: solace-broker
    shm_size: 2g
    ulimits:
      nofile:
        soft: 2448
        hard: 1048576
    ports:
      - "8080:8080"   # PubSub+ Manager (Web UI)
      - "2222:2222"   # Solace CLI (SSH)
      - "55333:55555" # SMF (Solace Message Format) - TCP
      - "8008:8008"   # Web Transport (WebSocket) - Used by the demo
      - "1883:1883"   # MQTT
      - "8000:8000"   # MQTT over WebSockets
      - "5672:5672"   # AMQP
      - "9000:9000"   # REST Messaging API
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=admin
    volumes:
      - solace-data:/var/lib/solace
      - solace-logs:/var/lib/solace/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --connect-timeout 3 http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  # Provision queues/subscriptions for each profiles/*.json via SEMP (requires profile "broker").
  solace-init:
    profiles: [broker]
    image: alpine:3.19
    container_name: solace-broker-init
    depends_on:
      solace-broker:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./profiles:/app/profiles:ro
    env_file:
      - path: ./demo.env
        required: false
    environment:
      SOLACE_HOST: solace-broker
      SEMP_HOST: solace-broker
      MSG_VPN: default
      SEMP_SCHEME: http
      SEMP_PORT: 8080
      SEMP_USER: admin
      SEMP_PASS: admin
      PROFILES_DIR: /app/profiles
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache curl jq >/dev/null
        exec /bin/sh /app/scripts/setup-solace.sh

volumes:
  solace-data:
    driver: local
  solace-logs:
    driver: local
